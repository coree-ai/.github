name: CI

on:
  push:
    branches: [main]
    paths:
      - scripts/**
      - biome.json
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - scripts/**
      - biome.json
      - .github/workflows/ci.yml

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Biome CI
        run: npx @biomejs/biome ci

  scripts:
    name: Scripts (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Node syntax check
        run: |
          shopt -s nullglob
          for f in scripts/*.{js,mjs}; do
            node --check "$f"
          done

      - name: Node tests
        run: |
          shopt -s nullglob
          for f in scripts/*.test.{js,mjs}; do
            node --test "$f"
          done
